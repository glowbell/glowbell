<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商品情報</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{--green:#1a6e43;--green-light:#e8f5ee;--amber:#b45309;--amber-bg:#fef3c7;--red:#b91c1c;--red-bg:#fee2e2;--border:#e5e7eb;--bg:#f3f4f6;--white:#fff;--text:#111827;--muted:#6b7280}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.topbar{background:var(--green);padding:13px 18px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.topbar-title{color:#fff;font-size:15px;font-weight:700}
.topbar-sub{color:rgba(255,255,255,.6);font-size:11px;margin-left:auto}
.loading{text-align:center;padding:80px 20px;color:var(--muted);font-size:14px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{margin:40px 20px;background:var(--white);border-radius:12px;padding:32px;text-align:center;border:1px solid var(--border)}
.error-box svg{width:36px;height:36px;stroke:#d1d5db;fill:none;stroke-width:1.5;margin-bottom:12px}
.error-box p{font-size:14px;color:var(--muted)}

/* 会社バッジ */
.company-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;margin:14px 18px 0}
.badge-A{background:#dbeafe;color:#1e40af}
.badge-B{background:#fce7f3;color:#9d174d}
.badge-default{background:var(--green-light);color:var(--green)}

/* ヒーロー */
.hero{background:var(--white);padding:14px 18px 18px;border-bottom:1px solid var(--border)}
.product-name{font-size:20px;font-weight:700;line-height:1.3;margin-bottom:4px}
.product-id{font-size:11px;font-family:'DM Mono',monospace;color:var(--muted)}

/* 基本情報 */
.info-card{background:var(--white);margin:10px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.card-head{padding:11px 18px;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.08em;border-bottom:1px solid var(--border)}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:10px 18px;border-bottom:1px solid var(--border);font-size:13px}
.info-row:last-child{border-bottom:none}
.info-key{color:var(--muted)}
.info-val{font-weight:500;text-align:right}

/* 画像ギャラリー */
.gallery{padding:14px 18px}
.gallery-main{width:100%;height:200px;object-fit:cover;border-radius:10px;background:var(--green-light);display:block;margin-bottom:10px}
.gallery-main-placeholder{width:100%;height:200px;border-radius:10px;background:var(--green-light);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;margin-bottom:10px}
.gallery-main-placeholder svg{width:40px;height:40px;stroke:var(--green);fill:none;stroke-width:1.2;opacity:.4}
.gallery-main-placeholder span{font-size:11px;color:var(--muted)}
.thumbs{display:flex;gap:8px}
.thumb{flex:1;height:64px;border-radius:8px;background:var(--green-light);border:2px solid transparent;cursor:pointer;overflow:hidden;transition:border-color .15s}
.thumb.active{border-color:var(--green)}
.thumb img{width:100%;height:100%;object-fit:cover}
.thumb-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.thumb-placeholder svg{width:18px;height:18px;stroke:var(--green);fill:none;stroke-width:1.5;opacity:.5}

/* ファイル */
.files-card{background:var(--white);margin:10px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.file-link{display:flex;align-items:center;gap:12px;padding:13px 18px;border-bottom:1px solid var(--border);text-decoration:none;transition:background .12s}
.file-link:last-child{border-bottom:none}
.file-link:hover{background:var(--bg)}
.file-icon{width:36px;height:36px;background:#e8f5ee;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.file-icon svg{width:18px;height:18px;stroke:var(--green);fill:none;stroke-width:1.8}
.file-info{flex:1}
.file-name{font-size:13px;font-weight:500;color:var(--text)}
.file-type{font-size:11px;color:var(--muted);margin-top:2px}
.file-arrow{color:var(--muted)}
.file-arrow svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2}

/* QRデモ一覧 */
.demo-list{padding:14px 18px}
.demo-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.08em;margin-bottom:10px}
.demo-item{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:13px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .15s,transform .1s}
.demo-item:hover{border-color:var(--green);transform:translateX(2px)}
.demo-item-icon{width:38px;height:38px;border-radius:8px;background:var(--green-light);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.demo-item-icon svg{width:18px;height:18px;stroke:var(--green);fill:none;stroke-width:1.8}
.demo-item-info{flex:1}
.demo-item-id{font-size:11px;font-family:'DM Mono',monospace;color:var(--muted)}
.demo-item-name{font-size:14px;font-weight:700;margin-top:2px}
.demo-item-co{font-size:11px;color:var(--muted);margin-top:2px}
.demo-arrow svg{width:14px;height:14px;stroke:var(--muted);fill:none;stroke-width:2.5}
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-title">設備点検カード</span>
  <span class="topbar-sub" id="topbar-sub"></span>
</div>

<div id="app"><div class="loading"><div class="spinner"></div>読み込み中...</div></div>

<script>
// ── サンプルデータ（本番はGoogleスプレッドシートCSVから取得）──
const DEMO_DATA = [
  {company:"A", id:"CMP-001", name:"コンプレッサー #A-03", created_date:"2019-04-01", delivery_date:"2024-12-01",
   image1:"", image2:"", image3:"",
   file1_name:"点検履歴_CMP-001.xlsx", file1_url:"#",
   file2_name:"取扱説明書.pdf", file2_url:"#"},
  {company:"A", id:"CMP-002", name:"コンプレッサー #B-01", created_date:"2021-06-15", delivery_date:"2025-01-15",
   image1:"", image2:"", image3:"",
   file1_name:"点検履歴_CMP-002.xlsx", file1_url:"#",
   file2_name:"", file2_url:""},
  {company:"A", id:"PMP-001", name:"ポンプ #C-02", created_date:"2018-03-10", delivery_date:"2024-11-30",
   image1:"", image2:"", image3:"",
   file1_name:"点検履歴_PMP-001.xlsx", file1_url:"#",
   file2_name:"", file2_url:""},
  {company:"B", id:"PMP-002", name:"ポンプ #D-04", created_date:"2022-09-01", delivery_date:"2025-03-01",
   image1:"", image2:"", image3:"",
   file1_name:"点検履歴_PMP-002.xlsx", file1_url:"#",
   file2_name:"", file2_url:""},
  {company:"B", id:"FAN-001", name:"換気扇 #E-01", created_date:"2020-07-20", delivery_date:"2025-02-01",
   image1:"", image2:"", image3:"",
   file1_name:"点検履歴_FAN-001.xlsx", file1_url:"#",
   file2_name:"", file2_url:""},
];

// 本番用：スプレッドシートCSVを取得する場合はこちらを使用
// const CSV_URL = "★ここにGoogleスプレッドシートのCSV公開URLを貼る★";
// async function fetchData() {
//   const res = await fetch(CSV_URL);
//   const text = await res.text();
//   const rows = text.trim().split("\n").map(r => r.split(","));
//   const headers = rows.shift().map(h => h.trim());
//   return rows.map(r => Object.fromEntries(headers.map((h,i) => [h,(r[i]||"").trim()])));
// }

const params = new URLSearchParams(location.search);
const targetCompany = params.get("company");
const targetId = params.get("id");

const badgeClass = {A:"badge-A", B:"badge-B"};

function getBadgeClass(co) { return badgeClass[co] || "badge-default"; }

function showProductPage(item) {
  document.getElementById('topbar-sub').textContent = item.id;
  const images = [item.image1, item.image2, item.image3].filter(u => u && u.trim());
  const mainImg = images[0] ? `<img class="gallery-main" src="${images[0]}" alt="${item.name}" id="main-img" onerror="this.style.display='none';document.getElementById('main-placeholder').style.display='flex'">
    <div class="gallery-main-placeholder" id="main-placeholder" style="display:none">` 
    : `<div class="gallery-main-placeholder" id="main-placeholder">`;
  const mainImgClose = `<svg viewBox="0 0 48 48"><rect x="4" y="8" width="40" height="32" rx="3"/><circle cx="17" cy="20" r="4"/><path d="M4 34l10-8 8 7 6-5 16 11"/></svg><span>画像はGoogleドライブのURLを設定すると表示されます</span></div>`;

  const thumbsHtml = [0,1,2].map(i => {
    const src = images[i];
    return `<div class="thumb${i===0?' active':''}" onclick="selectThumb(this,${i})">
      ${src ? `<img src="${src}" alt="" onerror="this.parentElement.innerHTML='<div class=thumb-placeholder><svg viewBox=\\'0 0 24 24\\'><rect x=\\'3\\' y=\\'3\\' width=\\'18\\' height=\\'18\\' rx=\\'2\\'/><circle cx=\\'8.5\\' cy=\\'8.5\\' r=\\'1.5\\'/><polyline points=\\'21 15 16 10 5 21\\'/></svg></div>'">`
      : `<div class="thumb-placeholder"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>`}
    </div>`;
  }).join('');

  const files = [];
  if(item.file1_url && item.file1_url !== '#') files.push({name:item.file1_name||'ファイル1',url:item.file1_url});
  else if(item.file1_name) files.push({name:item.file1_name,url:null});
  if(item.file2_url && item.file2_url !== '#') files.push({name:item.file2_name||'ファイル2',url:item.file2_url});
  else if(item.file2_name) files.push({name:item.file2_name,url:null});

  const filesHtml = files.length ? files.map(f => f.url 
    ? `<a class="file-link" href="${f.url}" target="_blank">
        <div class="file-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
        <div class="file-info"><div class="file-name">${f.name}</div><div class="file-type">タップしてダウンロード</div></div>
        <span class="file-arrow"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></span>
      </a>`
    : `<div class="file-link" style="opacity:.5;cursor:default">
        <div class="file-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
        <div class="file-info"><div class="file-name">${f.name}</div><div class="file-type">URLを設定すると表示されます</div></div>
      </div>`
  ).join('') : `<div style="padding:14px 18px;font-size:13px;color:var(--muted)">添付ファイルなし</div>`;

  document.getElementById('app').innerHTML = `
    <div class="company-badge ${getBadgeClass(item.company)}">${item.company}社 専用ページ</div>
    <div class="hero">
      <div class="product-name">${item.name}</div>
      <div class="product-id">${item.id}</div>
    </div>
    <div class="info-card">
      <div class="card-head">基本情報</div>
      <div class="info-row"><span class="info-key">設置場所</span><span class="info-val">${item.location||'—'}</span></div>
      <div class="info-row"><span class="info-key">登録日</span><span class="info-val">${item.created_date||'—'}</span></div>
      <div class="info-row"><span class="info-key">次回点検日</span><span class="info-val" style="color:var(--amber);font-weight:700">${item.delivery_date||'—'}</span></div>
    </div>
    <div class="gallery">
      <div class="card-head" style="padding:0 0 10px;border:none;margin-bottom:0">外観写真</div>
      ${mainImg}${mainImgClose}
      <div class="thumbs">${thumbsHtml}</div>
    </div>
    <div class="files-card">
      <div class="card-head">添付ファイル</div>
      ${filesHtml}
    </div>
  `;
  window._images = images;
}

function showDemoList() {
  document.getElementById('topbar-sub').textContent = 'デモ版';
  const coGroups = {};
  DEMO_DATA.forEach(d => { if(!coGroups[d.company]) coGroups[d.company]=[]; coGroups[d.company].push(d); });
  let html = '<div class="demo-list"><div class="demo-label">商品一覧（QR読み取りで個別ページへ）</div>';
  Object.entries(coGroups).forEach(([co, items]) => {
    html += `<div style="font-size:11px;color:var(--muted);font-weight:700;margin:12px 0 6px;letter-spacing:.05em">${co}社の設備</div>`;
    items.forEach(item => {
      html += `<div class="demo-item" onclick="window.location.search='?company=${item.company}&id=${item.id}'">
        <div class="demo-item-icon"><svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></div>
        <div class="demo-item-info">
          <div class="demo-item-id">${item.id}</div>
          <div class="demo-item-name">${item.name}</div>
          <div class="demo-item-co"><span class="company-badge ${getBadgeClass(co)}" style="margin:2px 0 0;padding:2px 8px;font-size:10px">${co}社</span></div>
        </div>
        <div class="demo-arrow"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
      </div>`;
    });
  });
  html += '</div>';
  document.getElementById('app').innerHTML = html;
}

window.selectThumb = function(el, idx) {
  document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  const src = (window._images||[])[idx];
  const main = document.getElementById('main-img');
  const placeholder = document.getElementById('main-placeholder');
  if(src && main) { main.src = src; main.style.display='block'; if(placeholder) placeholder.style.display='none'; }
};

if(targetCompany && targetId) {
  const item = DEMO_DATA.find(d => d.company===targetCompany && d.id===targetId);
  if(item) showProductPage(item);
  else document.getElementById('app').innerHTML = `<div class="error-box"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><p>商品が見つかりません<br><small style="font-size:11px;font-family:monospace">company=${targetCompany}&id=${targetId}</small></p></div>`;
} else {
  showDemoList();
}
</script>
</body>
</html>
