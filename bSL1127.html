<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商品情報</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{--green:#1a6e43;--green-light:#e8f5ee;--amber:#b45309;--amber-bg:#fef3c7;--border:#e5e7eb;--bg:#f3f4f6;--white:#fff;--text:#111827;--muted:#6b7280}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:600px;margin:0 auto}
.topbar{background:var(--green);padding:13px 18px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.topbar-title{color:#fff;font-size:15px;font-weight:700}
.topbar-sub{color:rgba(255,255,255,.6);font-size:11px;margin-left:auto}
.loading{text-align:center;padding:80px 20px;color:var(--muted);font-size:14px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{margin:40px 20px;background:var(--white);border-radius:12px;padding:32px;text-align:center;border:1px solid var(--border)}
.error-box p{font-size:14px;color:var(--muted);margin-top:8px}
.company-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;margin:14px 18px 0}
.badge-A{background:#dbeafe;color:#1e40af}
.badge-B{background:#fce7f3;color:#9d174d}
.badge-default{background:var(--green-light);color:var(--green)}
.hero{background:var(--white);padding:14px 18px 18px;border-bottom:1px solid var(--border)}
.product-name{font-size:20px;font-weight:700;line-height:1.3;margin-bottom:4px}
.product-id{font-size:11px;font-family:'DM Mono',monospace;color:var(--muted)}
.info-card{background:var(--white);margin:10px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.card-head{padding:11px 18px;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.08em;border-bottom:1px solid var(--border)}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:10px 18px;border-bottom:1px solid var(--border);font-size:13px}
.info-row:last-child{border-bottom:none}
.info-key{color:var(--muted)}
.info-val{font-weight:500;text-align:right}
.gallery{padding:14px 18px}
.gallery-main{width:100%;height:300px;border-radius:10px;background:var(--green-light);display:flex;flex-direction:column;align-items:center;justify-content:center;margin-bottom:10px;overflow:hidden}
.gallery-main img{width:100%;height:100%;object-fit:cover;border-radius:10px;display:block}
.gallery-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100%;gap:8px}
.gallery-placeholder svg{width:40px;height:40px;stroke:var(--green);fill:none;stroke-width:1.2;opacity:.4}
.gallery-placeholder span{font-size:11px;color:var(--muted)}
.thumbs{display:flex;gap:8px}
.thumb{flex:1;height:64px;border-radius:8px;background:var(--green-light);border:2px solid transparent;cursor:pointer;overflow:hidden;display:flex;align-items:center;justify-content:center;transition:border-color .15s}
.thumb.active{border-color:var(--green)}
.thumb img{width:100%;height:100%;object-fit:cover}
.thumb svg{width:18px;height:18px;stroke:var(--green);fill:none;stroke-width:1.5;opacity:.5}
.files-card{background:var(--white);margin:10px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.file-row{padding:12px 18px;border-bottom:1px solid var(--border)}
.file-row:last-child{border-bottom:none}
.file-header{display:flex;align-items:center;gap:10px;cursor:pointer}
.file-icon{width:36px;height:36px;background:#e8f5ee;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.file-icon svg{width:18px;height:18px;stroke:var(--green);fill:none;stroke-width:1.8}
.file-info{flex:1}
.file-name{font-size:13px;font-weight:500;color:var(--text)}
.file-type{font-size:11px;color:var(--muted);margin-top:2px}
.file-arrow svg{width:16px;height:16px;stroke:var(--muted);fill:none;stroke-width:2;transition:transform .2s}
.file-arrow.open svg{transform:rotate(90deg)}
.file-frame{display:none;margin-top:10px}
.file-frame iframe{width:100%;height:400px;border:none;border-radius:8px;background:var(--bg)}
.list-section{padding:16px 20px}
.list-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.08em;margin-bottom:10px}
.list-item{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:13px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .15s,transform .1s}
.list-item:hover{border-color:var(--green);transform:translateX(2px)}
.list-icon{width:38px;height:38px;border-radius:8px;background:var(--green-light);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.list-icon svg{width:18px;height:18px;stroke:var(--green);fill:none;stroke-width:1.8}
.list-info{flex:1}
.list-id{font-size:11px;font-family:'DM Mono',monospace;color:var(--muted)}
.list-name{font-size:14px;font-weight:700;margin-top:2px}
.list-loc{font-size:11px;color:var(--muted);margin-top:2px}
.list-arrow svg{width:14px;height:14px;stroke:var(--muted);fill:none;stroke-width:2.5}
</style>
</head>
<body>
<div class="topbar">
  <span class="topbar-title">各試験結果</span>
  <span class="topbar-sub" id="topbar-sub"></span>
</div>
<div id="app"><div class="loading"><div class="spinner"></div>読み込み中...</div></div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSwkLbARl1BjZPGMsVezP0nKoqkRpjHxdzoqfIahtax7IZCmtCJjjUHWO5tuFOiJg/pub?gid=1307910431&single=true&output=csv";

const params = new URLSearchParams(location.search);
const targetCompany = params.get("company");
const targetId = params.get("id");

async function fetchData() {
  const res = await fetch(CSV_URL);
  const text = await res.text();
  const rows = text.trim().split("\n").map(r => {
    const result = [];
    let cur = "", inQ = false;
    for(let i=0;i<r.length;i++){
      if(r[i]==='"'){inQ=!inQ;}
      else if(r[i]===','&&!inQ){result.push(cur.trim());cur="";}
      else{cur+=r[i];}
    }
    result.push(cur.trim());
    return result;
  });
  const headers = rows.shift().map(h => h.replace(/"/g,'').trim());
  return rows
    .filter(r => r.some(c => c && !c.includes('など') && !c.includes('YYYY') && !c.includes('ドライブ')))
    .map(r => Object.fromEntries(headers.map((h,i) => [h,(r[i]||"").replace(/"/g,'').trim()])));
}

const badgeClass = {A:"badge-A",B:"badge-B"};
function getBadge(co){return badgeClass[co]||"badge-default";}
function iconSvg(){return`<svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>`;}
function xlsSvg(){return`<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/></svg>`;}
function arrowSvg(){return`<svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>`;}
function imgPlaceholder(){return`<div class="gallery-placeholder"><svg viewBox="0 0 48 48"><rect x="4" y="8" width="40" height="32" rx="3"/><circle cx="17" cy="20" r="4"/><path d="M4 34l10-8 8 7 6-5 16 11"/></svg><span>画像未登録</span></div>`;}

function showProduct(item) {
  document.getElementById('topbar-sub').textContent = item.id;
  const images = [item.image1,item.image2].filter(u=>u&&u.trim()&&!u.includes('ドライブ')&&!u.includes('←'));
  window._imgs = images;

  const mainHtml = images[0]
    ? `<img src="${images[0]}" alt="" id="main-img" style="width:100%;height:100%;object-fit:cover;border-radius:10px">`
    : imgPlaceholder();

  const thumbsHtml = [0,1].map(i=>`
    <div class="thumb${i===0?' active':''}" onclick="selectThumb(this,${i})">
      ${images[i]?`<img src="${images[i]}" alt="" style="width:100%;height:100%;object-fit:cover">`:`<svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`}
    </div>`).join('');

  const files=[];
  if(item.file1_name&&item.file1_url&&!item.file1_url.includes('←')) files.push({name:item.file1_name,url:item.file1_url});
  if(item.file2_name&&item.file2_url&&!item.file2_url.includes('←')) files.push({name:item.file2_name,url:item.file2_url});

  const filesHtml = files.length
    ? files.map((f,i)=>`
      <div class="file-row">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
          <div class="file-icon">${xlsSvg()}</div>
          <div class="file-info">
            <div class="file-name">${f.name}</div>
          </div>
        </div>
        <div style="overflow:hidden;height:360px;border-radius:8px"><iframe src="${f.url}" style="width:100%;height:500px;border:none;margin-top:-110px" allowfullscreen></iframe></div>
      </div>`).join('')
    : `<div style="padding:14px 18px;font-size:13px;color:var(--muted)">ファイル未登録</div>`;

  document.getElementById('app').innerHTML = `
    <div class="company-badge ${getBadge(item.company)}">${item.company}社 専用ページ</div>
    <div class="hero">
      <div class="product-name">${item.name}</div>
      <div class="product-id">${item.id}</div>
    </div>
    <div class="info-card">
      <div class="card-head">基本情報</div>
      <div class="info-row"><span class="info-key">製造日</span><span class="info-val">${item.manufactured_date||'—'}</span></div>
      <div class="info-row"><span class="info-key">納入先</span><span class="info-val">${item.delivery_to||'—'}</span></div>
    </div>
    <div class="gallery">
      <div class="card-head" style="padding:0 0 10px;border:none">外観写真</div>
      <div class="gallery-main">${mainHtml}</div>
      <div class="thumbs">${thumbsHtml}</div>
    </div>
    <div class="files-card">
      <div class="card-head">添付ファイル</div>
      ${filesHtml}
    </div>`;
}

function showList(data) {
  document.getElementById('topbar-sub').textContent = '設備一覧';
  const coGroups = {};
  data.forEach(d=>{if(!coGroups[d.company])coGroups[d.company]=[];coGroups[d.company].push(d);});
  let html = '<div class="list-section">';
  Object.entries(coGroups).forEach(([co,items])=>{
    html += `<div class="list-label">${co}社の設備</div>`;
    items.forEach(item=>{
      html += `<div class="list-item" onclick="window.location.search='?company=${item.company}&id=${item.id}'">
        <div class="list-icon">${iconSvg()}</div>
        <div class="list-info">
          <div class="list-id">${item.id}</div>
          <div class="list-name">${item.name}</div>
          <div class="list-loc">${item.delivery_to||''}</div>
        </div>
        <div class="list-arrow">${arrowSvg()}</div>
      </div>`;
    });
  });
  html += '</div>';
  document.getElementById('app').innerHTML = html;
}

window.toggleFile = function(i){
  const frame = document.getElementById('frame-'+i);
  const arr = document.getElementById('arr-'+i);
  if(!frame) return;
  const show = frame.style.display === 'none' || frame.style.display === '';
  frame.style.display = show ? 'block' : 'none';
  if(arr) arr.classList.toggle('open', show);
};

window.selectThumb = function(el,idx){
  document.querySelectorAll('.thumb').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  const src=(window._imgs||[])[idx];
  const main=document.querySelector('.gallery-main');
  if(main){main.innerHTML=src?`<img src="${src}" style="width:100%;height:100%;object-fit:cover;border-radius:10px">`:`${imgPlaceholder()}`;}
};

(async()=>{
  try{
    const data = await fetchData();
    if(targetCompany&&targetId){
      const item=data.find(d=>d.company===targetCompany&&d.id===targetId);
      if(item){showProduct(item);}
      else{document.getElementById('app').innerHTML=`<div class="error-box"><p>商品が見つかりません<br><small style="font-size:11px;font-family:monospace">company=${targetCompany}&id=${targetId}</small></p></div>`;}
    } else {
      showList(data);
    }
  }catch(e){
    document.getElementById('app').innerHTML=`<div class="error-box"><p>データの読み込みに失敗しました<br><small>${e.message}</small></p></div>`;
  }
})();
</script>
</body>
</html>
